name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  SUPABASE_URL: https://example.supabase.co
  SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key
  SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
  VITE_SUPABASE_URL: https://example.supabase.co
  VITE_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run security:env
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- tests/e2e/public-smoke.spec.ts
